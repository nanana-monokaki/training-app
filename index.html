<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#f5f3ee">
  <meta name="description" content="ロードバイクのZwift、筋トレ、体重・体脂肪・疲労度を管理するトレーニングアプリ">
  <meta name="application-name" content="ロードバイク トレーニング">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-title" content="Training">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <title>ロードバイク トレーニング</title>
  <link rel="manifest" href="./manifest.json">
  <link rel="apple-touch-icon" href="./icons/apple-touch-icon.png">
  <link rel="icon" type="image/png" sizes="192x192" href="./icons/icon-192.png">
  <link rel="stylesheet" href="./src/styles.css">
</head>
<body>
  <div class="app">
    <header class="topbar">
      <div>
        <h1>ロードバイク トレーニング</h1>
        <p id="todayText">FTP154W / 東北180km / 自宅筋トレ</p>
      </div>
      <select id="goalSelect" aria-label="目標を選択">
        <option value="tohoku">東北180km</option>
        <option value="long">短期ロング</option>
        <option value="base">通常期</option>
      </select>
    </header>

    <main>
      <section class="panel hero">
        <div class="hero-head">
          <div>
            <h2 id="goalTitle">ツールド東北180km</h2>
            <p id="goalNote"></p>
          </div>
          <span class="badge" id="daysLeft">--日</span>
        </div>
        <div class="metrics">
          <div><span>Recovery</span><b>-85W</b></div>
          <div><span>Z2</span><b>95-115W</b></div>
          <div><span>SST</span><b>135-146W</b></div>
          <div><span>VO2max</span><b>170-185W</b></div>
        </div>
      </section>

      <section class="panel">
        <div class="section-head">
          <h2>今日</h2>
        </div>
        <div id="todayCard"></div>
      </section>

      <section class="panel">
        <div class="section-head">
          <h2>週間メニュー</h2>
          <span class="hint">曜日をタップで開閉</span>
        </div>
        <div id="weekList"></div>
      </section>

      <section class="panel">
        <h2>記録</h2>
        <div class="form-grid">
          <label>体重 kg<input id="weight" inputmode="decimal" placeholder="57.2"></label>
          <label>体脂肪率 %<input id="bodyFat" inputmode="decimal" placeholder="21.0"></label>
          <label>疲労度<select id="fatigue"><option>1</option><option>2</option><option selected>3</option><option>4</option><option>5</option></select></label>
          <label>状態<select id="status"><option>未入力</option><option>実施</option><option>短縮</option><option>休養</option></select></label>
        </div>
        <label>メモ<textarea id="memo" placeholder="脚、お尻、睡眠、補給など"></textarea></label>
        <div class="actions">
          <button id="saveLog" type="button">保存</button>
          <button id="clearLog" type="button" class="secondary">今日を消す</button>
        </div>
        <p id="saveStatus" class="hint"></p>
      </section>

      <section class="panel">
        <div class="section-head">
          <h2>記録グラフ</h2>
          <span class="hint">過去30件</span>
        </div>
        <div class="chart-grid">
          <div>
            <h3>体重</h3>
            <canvas id="weightChart" width="640" height="260" aria-label="体重の推移グラフ"></canvas>
          </div>
          <div>
            <h3>体脂肪率</h3>
            <canvas id="bodyFatChart" width="640" height="260" aria-label="体脂肪率の推移グラフ"></canvas>
          </div>
          <div>
            <h3>疲労度</h3>
            <canvas id="fatigueChart" width="640" height="260" aria-label="疲労度の推移グラフ"></canvas>
          </div>
        </div>
      </section>

      <section class="panel">
        <div class="section-head">
          <h2>トレーニングカレンダー</h2>
          <div class="calendar-actions">
            <button id="prevMonth" type="button" class="small-button">前月</button>
            <span id="calendarTitle" class="calendar-title"></span>
            <button id="nextMonth" type="button" class="small-button">翌月</button>
          </div>
        </div>
        <div class="calendar-legend" aria-label="状態の凡例">
          <span><i class="dot done"></i>実施</span>
          <span><i class="dot short"></i>短縮</span>
          <span><i class="dot rest"></i>休養</span>
          <span><i class="dot none"></i>未入力</span>
        </div>
        <div id="trainingCalendar" class="training-calendar" aria-label="トレーニング実施カレンダー"></div>
        <div id="calendarDetail" class="calendar-detail"></div>
      </section>

      <section class="panel">
        <div class="section-head">
          <h2>メモ履歴</h2>
          <span class="hint" id="historyCount">0件</span>
        </div>
        <div id="historyList" class="history-list"></div>
      </section>
    </main>
  </div>

  <script src="./src/app.js" type="module"></script>
</body>
</html>
